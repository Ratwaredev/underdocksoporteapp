name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-windows:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install frontend dependencies
        run: npm install

      - name: publish tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_DEFAULT_ORG_NAME: ${{ secrets.VITE_DEFAULT_ORG_NAME }}
          VITE_REMOTE_TOOL_URL: ${{ secrets.VITE_REMOTE_TOOL_URL }}
          VITE_LOCAL_ADMIN_EMAIL: ${{ secrets.VITE_LOCAL_ADMIN_EMAIL }}
          VITE_LOCAL_ADMIN_PASSWORD: ${{ secrets.VITE_LOCAL_ADMIN_PASSWORD }}
          VITE_LOCAL_ADMIN_ORG: ${{ secrets.VITE_LOCAL_ADMIN_ORG }}
        with:
          tagName: v__VERSION__
          releaseName: 'UnderDock Command UI v__VERSION__'
          releaseBody: 'Release automatica firmada para Windows.'
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          uploadPlainBinary: true
          uploadUpdaterSignatures: true
          args: ''
